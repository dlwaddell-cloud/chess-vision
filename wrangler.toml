name = "chess-vision"
main = "src/index.js"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2024-01-01"

[build]
command = "npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"

# Environment variables and secrets should be configured in Cloudflare Pages or with
# `wrangler secret put GEMINI_API_KEY` when deploying this project.
# Do NOT store your API key in source control.
# [vars]
# GEMINI_API_KEY = "REPLACE_WITH_YOUR_SECRET"
